{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-table text-primary"></i> Step 2: Content Matrix</h2>
<p class="text-muted">Enter your niche to generate a 30-day content plan (TOFU/MOFU/BOFU).</p>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card p-3">
            <h5>Your Niche</h5>
            <input id="nicheInput" class="form-control mb-2" placeholder="e.g., B2B Marketing" value="B2B Marketing">
            <button id="generateMatrixBtn" class="btn btn-primary w-100"><i class="fas fa-table"></i> Generate Matrix</button>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-3">
            <h5>Content Matrix</h5>
            <div id="matrixResult"><p class="text-muted">Your matrix will appear here...</p></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('generateMatrixBtn').addEventListener('click', async function() {
    const niche = document.getElementById('nicheInput').value;
    this.disabled = true; this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    try {
        const res = await fetch('/api/generate_matrix', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({niche})
        });
        const data = await res.json();
        if (data.success) {
            let html = '<table class="table table-bordered"><thead><tr><th>Type</th><th>Stage</th><th>Topic</th></tr></thead><tbody>';
            data.data.forEach(item => {
                html += `<tr><td>${item.content_type}</td><td>${item.funnel_stage}</td><td>${item.topic}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('matrixResult').innerHTML = html;
        }
    } catch(e) { alert('Error!'); }
    this.disabled = false; this.innerHTML = '<i class="fas fa-table"></i> Generate Matrix';
});
</script>
{% endblock %}
