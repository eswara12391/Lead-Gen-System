{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-pen-fancy text-primary"></i> Step 3: PAS Posts</h2>
<p class="text-muted">Generate Problem-Agitate-Solution posts for your topics.</p>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card p-3">
            <h5>Select Topic</h5>
            <input id="topicText" class="form-control mb-2" placeholder="Topic" value="Lead Generation">
            <button id="generatePostBtn" class="btn btn-primary w-100"><i class="fas fa-pen"></i> Generate Post</button>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-3">
            <h5>PAS Post</h5>
            <div id="postResult"><p class="text-muted">Your post will appear here...</p></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('generatePostBtn').addEventListener('click', async function() {
    const topic = document.getElementById('topicText').value;
    this.disabled = true; this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    try {
        const res = await fetch('/api/generate_post', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({topic})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('postResult').innerHTML = `
                <div class="alert alert-info">
                    <strong>Hook:</strong> ${data.data.hook}<br><br>
                    <strong>Problem:</strong> ${data.data.problem}<br><br>
                    <strong>Agitate:</strong> ${data.data.agitate}<br><br>
                    <strong>Solution:</strong> ${data.data.solution}<br><br>
                    <strong>CTA:</strong> ${data.data.cta}
                </div>
            `;
        }
    } catch(e) { alert('Error!'); }
    this.disabled = false; this.innerHTML = '<i class="fas fa-pen"></i> Generate Post';
});
</script>
{% endblock %}
